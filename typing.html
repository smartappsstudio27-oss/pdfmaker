<style>
<body>

<header class="app-header">
  <div class="brand-row">
    <div class="logo-mark"><img src="smartapps.png" alt="SmartApps Studio logo"></div>
    <div class="brand-text">
      <h1>Smart Typing</h1>
      <p>SmartApps Studio</p>
    </div>
  </div>

  <div class="ribbon">
    <div class="ribbon-group">
      <span class="grp-label">Session</span>
      <input type="text" id="nameInput" placeholder="Your name" maxlength="30">
      <button class="btn btn-start" id="startBtn">▶ Start</button>
      <button class="btn btn-stop" id="stopBtn" disabled>■ Stop</button>
      <button class="btn btn-ghost" id="resetBtn">⟲ Reset</button>
    </div>

    <div class="ribbon-group">
      <span class="grp-label">Timer</span>
      <select id="durationSelect">
        <option value="60">1 min</option>
        <option value="180" selected>3 min</option>
        <option value="300">5 min</option>
        <option value="600">10 min</option>
        <option value="0">No limit</option>
      </select>
    </div>

    <div class="ribbon-group">
      <span class="grp-label">Passage</span>
      <select id="levelSelect">
        <option value="all">All levels</option>
        <option value="Easy">Easy</option>
        <option value="Medium">Medium</option>
        <option value="Hard">Hard</option>
        <option value="Exam">Exam prep</option>
      </select>
      <button class="btn btn-ghost" id="nextBtn" disabled>⇥ Next Passage</button>
    </div>
  </div>

  <div class="stats-bar">
    <div class="stat timer"><span class="val" id="timeVal">00:00</span><span class="lbl">Time</span></div>
    <div class="stat"><span class="val" id="wpmVal">0</span><span class="lbl">WPM</span></div>
    <div class="stat"><span class="val" id="accVal">100%</span><span class="lbl">Accuracy</span></div>
    <div class="stat"><span class="val" id="errVal">0</span><span class="lbl">Errors</span></div>
    <div class="stat"><span class="val" id="passVal">0</span><span class="lbl">Passages</span></div>
  </div>
</header>

<main class="workspace">
  <section class="panel passage-panel">
    <div class="panel-label">Passage — <span id="passageTopic">Ready</span></div>
    <div class="passage-text" id="passageText">Press <strong>Start</strong> to load a passage and begin.</div>
    <div class="carriage-track"><div class="carriage" id="carriage"></div></div>
  </section>

  <section class="panel type-panel">
    <div class="panel-label">Your Typing</div>
    <div class="typed-wrap" id="typedWrap">
      <div class="typed-text" id="typedText"></div>
      <textarea id="hiddenInput" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></textarea>
    </div>
    <div class="hint" id="hint">Enter your name and click Start. Pasting is disabled — this is a typing test!</div>
  </section>
</main>

<div class="modal-overlay" id="resultModal">
  <div class="certificate">
    <div class="cert-eyebrow">Smart Typing · Result</div>
    <h2>Well done!</h2>
    <div class="cert-name" id="certName">—</div>
    <div class="cert-grid">
      <div class="cbox"><div class="v" id="certWpm">0</div><div class="l">Words / Min</div></div>
      <div class="cbox"><div class="v" id="certAcc">0%</div><div class="l">Accuracy</div></div>
      <div class="cbox"><div class="v" id="certTime">0:00</div><div class="l">Time Taken</div></div>
      <div class="cbox"><div class="v" id="certPass">0</div><div class="l">Passages Done</div></div>
    </div>
    <div class="cert-actions">
      <button class="btn btn-start" id="tryAgainBtn">Try Again</button>
      <button class="btn btn-ghost" id="printBtn">🖨 Print Certificate</button>
    </div>
    <div class="cert-date" id="certDate"></div>
  </div>
</div>

<script>
(function(){

  // ---------- Passage bank ----------
  const PASSAGES = [
    {topic:"Technology", level:"Easy", text:"Computers have changed the way people live and work. From simple calculators to powerful smartphones, technology keeps growing faster every year. Learning to type quickly and correctly is one of the most useful skills in this digital age."},
    {topic:"Nature", level:"Easy", text:"The forest was quiet in the early morning. Birds called softly from the tall trees while a gentle breeze moved through the leaves. Sunlight slipped between the branches and touched the cool, damp ground below."},
    {topic:"Motivation", level:"Easy", text:"Success rarely comes overnight. It is built slowly, through small efforts repeated every single day. Anyone who keeps practicing with patience and focus will eventually notice real and lasting improvement."},
    {topic:"General Knowledge", level:"Easy", text:"India is home to many rivers, mountains, and languages. Its culture has grown over thousands of years, blending traditions from many regions into one large and diverse nation."},
    {topic:"Business", level:"Medium", text:"A good business plan clearly explains what a company sells, who its customers are, and how it plans to earn a profit. Investors often look for a strong plan before deciding whether to support a new venture with their money."},
    {topic:"Science", level:"Medium", text:"Gravity is the force that pulls objects toward one another. It keeps the planets moving around the sun and keeps every person firmly on the ground. Without gravity, everything on Earth would simply drift away into space."},
    {topic:"History", level:"Medium", text:"Ancient civilizations built great cities long before machines existed to help them. Using only simple tools, human labor, and clever engineering, they constructed monuments that have survived for thousands of years and still amaze visitors today."},
    {topic:"Technology", level:"Medium", text:"Artificial intelligence is a branch of computer science that focuses on building systems capable of performing tasks that normally require human intelligence, such as recognizing speech, understanding language, and making decisions based on data."},
    {topic:"Exam", level:"Exam", text:"Candidates appearing for competitive examinations are advised to manage their time carefully, attempt easier questions first, and avoid spending too long on a single problem. Regular practice under timed conditions greatly improves both speed and accuracy."},
    {topic:"Exam", level:"Exam", text:"Typing speed is often tested in government and clerical examinations, where candidates must type a given passage accurately within a fixed time limit. A minimum accuracy percentage is usually required alongside a target words-per-minute score."},
    {topic:"Environment", level:"Medium", text:"Climate change refers to long-term shifts in temperatures and weather patterns. While some changes occur naturally, human activity, especially burning fossil fuels, has been the main driver of these changes since the industrial era began."},
    {topic:"Health", level:"Easy", text:"Drinking enough water, sleeping well, and staying active are simple habits that support good health. Small daily choices, repeated consistently, often matter more than occasional bursts of intense effort."},
    {topic:"Space", level:"Hard", text:"Astronomers estimate that the observable universe contains roughly two trillion galaxies, each holding hundreds of billions of stars. Despite this staggering scale, light from the most distant galaxies takes billions of years to reach telescopes on Earth, meaning we observe them as they existed long ago."},
    {topic:"Economics", level:"Hard", text:"Inflation occurs when the general price level of goods and services rises over time, reducing the purchasing power of a currency. Central banks attempt to manage inflation by adjusting interest rates, a delicate balancing act that affects borrowing, spending, and overall economic growth."},
    {topic:"Literature", level:"Hard", text:"Great literature often explores universal themes such as love, loss, ambition, and morality, allowing readers across different cultures and generations to find meaning within the same story. A well-crafted narrative can reveal truths about human nature that plain explanation never quite manages to capture."},
    {topic:"Philosophy", level:"Hard", text:"Philosophers have long debated the nature of free will, questioning whether human choices are truly independent or simply the result of prior causes stretching back before birth. This question touches fields as varied as physics, psychology, law, and everyday moral responsibility."},
    {topic:"Sports", level:"Medium", text:"Consistent training, proper nutrition, and adequate rest form the foundation of any successful athletic career. Even the most naturally gifted players rely on disciplined daily routines to maintain peak performance across a long and demanding season."},
    {topic:"Career", level:"Easy", text:"Building a strong resume takes time and honest reflection. Employers usually look for clear achievements, relevant skills, and a good match between the candidate and the role, rather than simply a long list of past job titles."}
  ];

  // ---------- State ----------
  let state = {
    running:false,
    duration:180,
    remaining:180,
    noLimit:false,
    elapsed:0,
    timerId:null,
    currentPassage:null,
    typed:'',
    totalTyped:0,
    totalCorrect:0,
    passagesCompleted:0,
    lastIndex:-1
  };

  // ---------- Elements ----------
  const nameInput = document.getElementById('nameInput');
  const startBtn = document.getElementById('startBtn');
  const stopBtn = document.getElementById('stopBtn');
  const resetBtn = document.getElementById('resetBtn');
  const nextBtn = document.getElementById('nextBtn');
  const durationSelect = document.getElementById('durationSelect');
  const levelSelect = document.getElementById('levelSelect');

  const timeVal = document.getElementById('timeVal');
  const wpmVal = document.getElementById('wpmVal');
  const accVal = document.getElementById('accVal');
  const errVal = document.getElementById('errVal');
  const passVal = document.getElementById('passVal');

  const passageTopic = document.getElementById('passageTopic');
  const passageText = document.getElementById('passageText');
  const typedText = document.getElementById('typedText');
  const hiddenInput = document.getElementById('hiddenInput');
  const carriage = document.getElementById('carriage');
  const hint = document.getElementById('hint');

  const resultModal = document.getElementById('resultModal');
  const certName = document.getElementById('certName');
  const certWpm = document.getElementById('certWpm');
  const certAcc = document.getElementById('certAcc');
  const certTime = document.getElementById('certTime');
  const certPass = document.getElementById('certPass');
  const certDate = document.getElementById('certDate');
  const tryAgainBtn = document.getElementById('tryAgainBtn');
  const printBtn = document.getElementById('printBtn');

  // ---------- Helpers ----------
  function pickPassage(){
    const level = levelSelect.value;
    let pool = level === 'all' ? PASSAGES : PASSAGES.filter(p => p.level === level);
    if(pool.length === 0) pool = PASSAGES;
    let idx;
    if(pool.length === 1){
      idx = 0;
    } else {
      do { idx = Math.floor(Math.random() * pool.length); } while(pool[idx] === state.currentPassage);
    }
    return pool[idx];
  }

  function loadPassage(){
    state.currentPassage = pickPassage();
    state.typed = '';
    passageTopic.textContent = state.currentPassage.topic + ' · ' + state.currentPassage.level;
    renderPassage();
    renderTyped();
    updateCarriage();
  }

  function renderPassage(){
    const text = state.currentPassage.text;
    const typed = state.typed;
    let html = '';
    for(let i=0;i<text.length;i++){
      let cls = 'pending';
      if(i < typed.length){
        cls = typed[i] === text[i] ? 'correct' : 'incorrect';
      } else if(i === typed.length){
        cls = 'current';
      }
      html += `<span class="ch ${cls}">${escapeHtml(text[i])}</span>`;
    }
    passageText.innerHTML = html;
  }

  function renderTyped(){
    const text = state.currentPassage.text;
    const typed = state.typed;
    let html = '';
    for(let i=0;i<typed.length;i++){
      const cls = typed[i] === text[i] ? 'correct' : 'incorrect';
      html += `<span class="ch ${cls}">${escapeHtml(typed[i])}</span>`;
    }
    html += '<span class="caret"></span>';
    typedText.innerHTML = html;
    document.getElementById('typedWrap').scrollTop = document.getElementById('typedWrap').scrollHeight;
  }

  function escapeHtml(ch){
    if(ch === '<') return '&lt;';
    if(ch === '>') return '&gt;';
    if(ch === '&') return '&amp;';
    if(ch === ' ') return ' ';
    return ch;
  }

  function updateCarriage(){
    const total = state.currentPassage ? state.currentPassage.text.length : 1;
    const pct = Math.min(100, (state.typed.length / total) * 100);
    carriage.style.left = `calc(${pct}% - 7px)`;
  }

  function currentCorrectCount(){
    const text = state.currentPassage.text;
    const typed = state.typed;
    let c = 0;
    for(let i=0;i<typed.length;i++){ if(typed[i] === text[i]) c++; }
    return c;
  }

  function finalizeCurrentPassage(){
    if(!state.currentPassage) return;
    state.totalTyped += state.typed.length;
    state.totalCorrect += currentCorrectCount();
    state.passagesCompleted += 1;
  }

  function liveStats(){
    const correctSoFar = state.totalCorrect + (state.currentPassage ? currentCorrectCount() : 0);
    const typedSoFar = state.totalTyped + (state.currentPassage ? state.typed.length : 0);
    const timeSec = state.noLimit ? state.elapsed : (state.duration - state.remaining);
    const minutes = Math.max(timeSec, 1) / 60;
    const wpm = Math.max(0, Math.round((correctSoFar / 5) / minutes));
    const accuracy = typedSoFar > 0 ? Math.round((correctSoFar / typedSoFar) * 100) : 100;
    const errors = typedSoFar - correctSoFar;
    return {wpm, accuracy, errors, typedSoFar, correctSoFar, timeSec};
  }

  function refreshStatsBar(){
    const s = liveStats();
    wpmVal.textContent = s.wpm;
    accVal.textContent = s.accuracy + '%';
    errVal.textContent = s.errors;
    passVal.textContent = state.passagesCompleted;
  }

  function formatTime(sec){
    sec = Math.max(0, Math.floor(sec));
    const m = Math.floor(sec/60).toString().padStart(2,'0');
    const s = (sec%60).toString().padStart(2,'0');
    return m+':'+s;
  }

  // ---------- Timer ----------
  function tick(){
    if(state.noLimit){
      state.elapsed += 1;
      timeVal.textContent = formatTime(state.elapsed);
    } else {
      state.remaining -= 1;
      timeVal.textContent = formatTime(state.remaining);
      if(state.remaining <= 0){
        refreshStatsBar();
        stopSession(true);
        return;
      }
    }
    refreshStatsBar();
  }

  // ---------- Session control ----------
  function startSession(){
    const name = nameInput.value.trim();
    if(!name){
      hint.textContent = 'Please enter your name before starting.';
      nameInput.focus();
      return;
    }
    const durVal = parseInt(durationSelect.value, 10);
    state.noLimit = durVal === 0;
    state.duration = durVal;
    state.remaining = durVal;
    state.elapsed = 0;
    state.totalTyped = 0;
    state.totalCorrect = 0;
    state.passagesCompleted = 0;
    state.running = true;

    startBtn.disabled = true;
    stopBtn.disabled = false;
    nextBtn.disabled = false;
    nameInput.disabled = true;
    durationSelect.disabled = true;
    hint.textContent = 'Go! Start typing the passage on the left.';

    timeVal.textContent = state.noLimit ? '00:00' : formatTime(state.remaining);
    refreshStatsBar();

    loadPassage();
    hiddenInput.value = '';
    hiddenInput.disabled = false;
    hiddenInput.focus();

    state.timerId = setInterval(tick, 1000);
  }

  function stopSession(auto){
    if(!state.running) return;
    finalizeCurrentPassage();
    clearInterval(state.timerId);
    state.running = false;
    hiddenInput.disabled = true;
    startBtn.disabled = false;
    stopBtn.disabled = true;
    nextBtn.disabled = true;
    nameInput.disabled = false;
    durationSelect.disabled = false;
    hint.textContent = auto ? 'Time is up! Here are your results.' : 'Session stopped. Here are your results.';
    showResults();
  }

  function resetSession(){
    clearInterval(state.timerId);
    state = {
      running:false, duration:parseInt(durationSelect.value,10)||180,
      remaining:parseInt(durationSelect.value,10)||180, noLimit:durationSelect.value==='0',
      elapsed:0, timerId:null, currentPassage:null, typed:'', totalTyped:0, totalCorrect:0,
      passagesCompleted:0, lastIndex:-1
    };
    startBtn.disabled = false;
    stopBtn.disabled = true;
    nextBtn.disabled = true;
    nameInput.disabled = false;
    durationSelect.disabled = false;
    hiddenInput.value = '';
    hiddenInput.disabled = true;
    passageTopic.textContent = 'Ready';
    passageText.innerHTML = 'Press <strong>Start</strong> to load a passage and begin.';
    typedText.innerHTML = '';
    carriage.style.left = '0';
    timeVal.textContent = '00:00';
    wpmVal.textContent = '0';
    accVal.textContent = '100%';
    errVal.textContent = '0';
    passVal.textContent = '0';
    hint.textContent = 'Enter your name and click Start. Pasting is disabled — this is a typing test!';
    resultModal.classList.remove('show');
  }

  function advancePassage(manual){
    finalizeCurrentPassage();
    if(manual){
      carriage.classList.remove('ding'); void carriage.offsetWidth; carriage.classList.add('ding');
    } else {
      carriage.classList.remove('ding'); void carriage.offsetWidth; carriage.classList.add('ding');
    }
    loadPassage();
    refreshStatsBar();
  }

  function showResults(){
    const s = liveStats();
    certName.textContent = nameInput.value.trim() || 'Anonymous';
    certWpm.textContent = s.wpm;
    certAcc.textContent = s.accuracy + '%';
    certTime.textContent = formatTime(s.timeSec);
    certPass.textContent = state.passagesCompleted;
    certDate.textContent = new Date().toLocaleDateString('en-IN', {year:'numeric',month:'long',day:'numeric'});
    resultModal.classList.add('show');
  }

  // ---------- Input handling ----------
  hiddenInput.addEventListener('input', function(e){
    if(!state.running || !state.currentPassage) return;
    let val = e.target.value;
    const maxLen = state.currentPassage.text.length;
    if(val.length > maxLen) val = val.slice(0, maxLen);
    state.typed = val;
    renderPassage();
    renderTyped();
    updateCarriage();
    refreshStatsBar();

    if(state.typed.length >= maxLen){
      hiddenInput.value = '';
      advancePassage(false);
    }
  });

  hiddenInput.addEventListener('paste', function(e){ e.preventDefault(); });
  hiddenInput.addEventListener('contextmenu', function(e){ e.preventDefault(); });

  document.getElementById('typedWrap').addEventListener('click', function(){
    if(state.running) hiddenInput.focus();
  });

  // ---------- Button wiring ----------
  startBtn.addEventListener('click', startSession);
  stopBtn.addEventListener('click', function(){ stopSession(false); });
  resetBtn.addEventListener('click', resetSession);
  nextBtn.addEventListener('click', function(){
    if(state.running){
      hiddenInput.value = '';
      advancePassage(true);
    }
  });
  tryAgainBtn.addEventListener('click', function(){
    resultModal.classList.remove('show');
    resetSession();
  });
  printBtn.addEventListener('click', function(){ window.print(); });

  durationSelect.addEventListener('change', function(){
    if(!state.running){
      const durVal = parseInt(durationSelect.value,10);
      state.noLimit = durVal === 0;
      state.duration = durVal;
      state.remaining = durVal;
      timeVal.textContent = state.noLimit ? '00:00' : formatTime(durVal);
    }
  });

  // Initial paint
  resetSession();

})();
</script>
</body>
</html>
